[tox]
requires =
    tox-uv>=1.35
env_list =
    unit
    lint

[testenv:unit]
description = Run unit tests
dependency_groups =
    dev
commands =
    pytest tests/ -v {posargs}

[testenv:lint]
description = Run ruff linter and formatter check
dependency_groups =
    dev
commands =
    ruff check {posargs:sunbeam_deployer/ tests/}
    ruff format --check {posargs:sunbeam_deployer/ tests/}
